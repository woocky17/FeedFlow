services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: feedflow
      POSTGRES_PASSWORD: feedflow
      POSTGRES_DB: feedflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://feedflow:feedflow@db:5432/feedflow
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      CRON_SECRET: ${CRON_SECRET:-change-me}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NEWS_EVENT_SIMILARITY_THRESHOLD: ${NEWS_EVENT_SIMILARITY_THRESHOLD:-0.72}
      STORY_SIMILARITY_THRESHOLD: ${STORY_SIMILARITY_THRESHOLD:-0.55}
    volumes:
      - xenova_cache:/app/node_modules/@xenova/transformers/.cache
    depends_on:
      - db

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://feedflow:feedflow@db:5432/feedflow
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NEWS_EVENT_SIMILARITY_THRESHOLD: ${NEWS_EVENT_SIMILARITY_THRESHOLD:-0.72}
      STORY_SIMILARITY_THRESHOLD: ${STORY_SIMILARITY_THRESHOLD:-0.55}
      # Default sync: every 2h. WorldNewsAPI free = 50 pts/day, ~1.2 pts/call → safe for ≤3 worldnews sources.
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-7200}
      # Default notifications: once a day.
      NOTIFICATIONS_INTERVAL_SECONDS: ${NOTIFICATIONS_INTERVAL_SECONDS:-86400}
      BACKFILL_MAX_DAYS: ${BACKFILL_MAX_DAYS:-3}
    volumes:
      - xenova_cache:/app/node_modules/@xenova/transformers/.cache

volumes:
  pgdata:
  xenova_cache:
